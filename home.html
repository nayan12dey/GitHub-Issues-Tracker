<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwindcss + daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- Added geist fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Add css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- navbar section -->
    <header>
        <div class="flex justify-between items-center shadow-md">
            <div class="flex items-center p-4 gap-2">
                <img src="./assets/github-logo.png" alt="" class="w-9">
                <h2 class="font-bold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-3 p-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search issues..." />
                </label>
                <button class="btn btn-primary" onclick="showSearchCards()">Search Issues</button>
            </div>
        </div>
    </header>


    <!-- main section -->
    <main class="w-11/12 mx-auto">

        <!-- category button section -->
        <section>
            <div id="filter-button" class="border border-gray-300 shadow-lg rounded-xl mt-15 p-4 flex gap-4">
                <button class="btn active" onclick="showAllCard()">All</button>
                <button class="btn" onclick="showOpenCard()">Open</button>
                <button class="btn" onclick="showClosedCard()">Closed</button>
            </div>
        </section>





        <!-- card section -->
        <section class="shadow-md">
            <!-- card tracker section -->
            <section class="mt-10">
                <div class="flex justify-between items-center rounded-lg p-4 border border-gray-300">
                    <div class="flex items-center gap-2">
                        <img src="./assets/Aperture.png" alt="" class="w-12 h-12  bg-purple-200 rounded-full p-2">
                        <div>
                            <h2 class="font-bold text-xl"><span id="issues-no">50</span> Issues</h2>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-3 items-center">
                        <p><i class="fa-solid fa-circle text-green-500"></i> Open</p>
                        <p><i class="fa-solid fa-circle text-purple-500"></i> Closed</p>
                    </div>
                </div>
            </section>

            <!-- loading spinner -->
            <div id="spinner" class="flex justify-center items-center py-20"><span
                    class="loading loading-spinner loading-xl text-purple-600"></span></div>

            <!-- card container section -->
            <section id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 mx-auto">

            </section>
        </section>


        <!-- No Issue Found section -->
        <div id="no-issue-found"
            class="flex flex-col justify-center items-center  bg-gray-800 p-10 rounded-xl shadow-md text-center mt-4 hidden">
            <i class="fa-solid fa-triangle-exclamation text-yellow-400 text-9xl mb-6"></i>
            <h3 class="font-extrabold text-5xl text-white mb-2">No Data Found</h3>
            <p class="text-gray-400 text-lg max-w-md">
                Sorry, we couldn’t find any data to display here. Try adjusting your filters or check back later.
            </p>
        </div>




        <!-- card details modal -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="card_details_modal.showModal()">open modal</button> -->
        <dialog id="card_details_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="card-details-container"></div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>


    <script src="./script/script.js"></script>
</body>

</html>
