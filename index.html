<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwindcss + daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- Added geist fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Add css file -->
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <!-- login page -->
    <section id="login-section" class="min-h-screen flex justify-center items-center bg-base-200 mx-auto">
        <div class="max-w-md shadow-lg rounded-lg p-8 bg-base-100 sm:w-full">
            <div class="my-2">
                <img src="./assets/github-logo.png" alt="" class="mx-auto">
                <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h2>
                <p class="text-center text-gray-500">Sign in to manage your issues</p>
            </div>
            <fieldset class="fieldset">
                <legend class="fieldset-legend text-lg">Username</legend>
                <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
                <p class="label text-primary font-bold text-md">Default: admin</p>
            </fieldset>

            <fieldset class="fieldset">
                <legend class="fieldset-legend text-lg">Password</legend>
                <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                <p class="label text-primary font-bold text-md">Default: admin123</p>
            </fieldset>

            <button id="login-button" class="btn btn-primary w-full mt-3">Sign In</button>

            <div class="my-4 grid grid-cols-5 items-center">
                <hr class="text-gray-300 col-span-2">
                <p class="text-center col-span-1">OR</p>
                <hr class="text-gray-300 col-span-2">
            </div>

            <p class="text-center mt-2 text-sm text-gray-500">Demo Credentials:</p>
            <div class="bg-sky-100 text-center p-4">
                <p class="text-sm"><span class="font-bold">Username:</span> admin</p>
                <p class="text-sm"><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>

    </section>


    <script src="./script/login.js"></script>
    <script src="./script/script.js"></script>
</body>

</html>
